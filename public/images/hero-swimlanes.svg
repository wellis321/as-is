<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Structured swimlane process map</title>
  <desc id="desc">A clean diagram with three swimlanes and connected steps</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#e8f0f8"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3d8ba8"/>
    </marker>
  </defs>
  <rect width="640" height="420" rx="16" fill="url(#bg)"/>
  <rect x="24" y="24" width="592" height="72" rx="8" fill="#fff3e0" stroke="#e8c9a0"/>
  <text x="40" y="52" font-family="Georgia, serif" font-size="14" fill="#6b4f2a">Tenant</text>
  <rect x="48" y="64" width="88" height="24" rx="6" fill="#fff" stroke="#c9a66b"/>
  <text x="60" y="80" font-family="sans-serif" font-size="11" fill="#333">1. Contact</text>

  <rect x="24" y="108" width="592" height="140" rx="8" fill="#e8f5e9" stroke="#b7d9bc"/>
  <text x="40" y="136" font-family="Georgia, serif" font-size="14" fill="#2f5c3a">Customer First</text>
  <rect x="120" y="148" width="100" height="24" rx="6" fill="#fff" stroke="#7cb587"/>
  <text x="132" y="164" font-family="sans-serif" font-size="11" fill="#333">2. Take call</text>
  <rect x="260" y="148" width="110" height="24" rx="6" fill="#fff" stroke="#7cb587"/>
  <text x="272" y="164" font-family="sans-serif" font-size="11" fill="#333">3. Log in system</text>
  <polygon points="400,160 420,148 420,172" fill="#fff8e1" stroke="#d4a72c"/>
  <text x="428" y="164" font-family="sans-serif" font-size="11" fill="#333">4. Route?</text>
  <rect x="500" y="148" width="90" height="24" rx="6" fill="#fff" stroke="#7cb587"/>
  <text x="512" y="164" font-family="sans-serif" font-size="11" fill="#333">5. New job</text>

  <rect x="24" y="260" width="592" height="136" rx="8" fill="#e3f2fd" stroke="#a8cceb"/>
  <text x="40" y="288" font-family="Georgia, serif" font-size="14" fill="#2a4f6e">Technical Officer</text>
  <rect x="500" y="300" width="96" height="24" rx="6" fill="#fff" stroke="#7aaed4"/>
  <text x="512" y="316" font-family="sans-serif" font-size="11" fill="#333">44. Review</text>

  <line x1="136" y1="88" x2="170" y2="148" stroke="#3d8ba8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="220" y1="160" x2="258" y2="160" stroke="#3d8ba8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="160" x2="398" y2="160" stroke="#3d8ba8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="420" y1="172" x2="545" y2="300" stroke="#3d8ba8" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
